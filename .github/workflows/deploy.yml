name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-portfolio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: site

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Archive build output
        run: tar -czf ../site-dist.tar.gz -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site-dist.tar.gz
          if-no-files-found: error

  deploy-origin-1:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 8
    outputs:
      deploy_result: ${{ steps.origin-result.outputs.deploy_result }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist

      - name: Copy artifact to origin 1
        id: copy
        continue-on-error: true
        timeout-minutes: 3
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORIGIN1_HOST }}
          username: ${{ secrets.ORIGIN_USER }}
          key: ${{ secrets.ORIGIN_SSH_KEY }}
          source: "site-dist.tar.gz"
          target: "/tmp"

      - name: Deploy on origin 1
        id: deploy
        if: steps.copy.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 3
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORIGIN1_HOST }}
          username: ${{ secrets.ORIGIN_USER }}
          key: ${{ secrets.ORIGIN_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/html
            sudo tar -xzf /tmp/site-dist.tar.gz -C /var/www/html
            sudo chown -R debian:debian /var/www/html
            sudo nginx -t
            sudo systemctl reload nginx

      - name: Record origin 1 result
        id: origin-result
        if: always()
        run: |
          if [ "${{ steps.copy.outcome }}" = "success" ] && [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "deploy_result=success" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_result=failure" >> "$GITHUB_OUTPUT"
            echo "::warning::origin 1 did not deploy successfully. copy=${{ steps.copy.outcome }}, deploy=${{ steps.deploy.outcome }}"
          fi

  deploy-origin-2:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 8
    outputs:
      deploy_result: ${{ steps.origin-result.outputs.deploy_result }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist

      - name: Copy artifact to origin 2
        id: copy
        continue-on-error: true
        timeout-minutes: 3
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORIGIN2_HOST }}
          username: ${{ secrets.ORIGIN_USER }}
          key: ${{ secrets.ORIGIN_SSH_KEY }}
          source: "site-dist.tar.gz"
          target: "/tmp"

      - name: Deploy on origin 2
        id: deploy
        if: steps.copy.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 3
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORIGIN2_HOST }}
          username: ${{ secrets.ORIGIN_USER }}
          key: ${{ secrets.ORIGIN_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/html
            sudo tar -xzf /tmp/site-dist.tar.gz -C /var/www/html
            sudo chown -R debian:debian /var/www/html
            sudo nginx -t
            sudo systemctl reload nginx

      - name: Record origin 2 result
        id: origin-result
        if: always()
        run: |
          if [ "${{ steps.copy.outcome }}" = "success" ] && [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "deploy_result=success" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_result=failure" >> "$GITHUB_OUTPUT"
            echo "::warning::origin 2 did not deploy successfully. copy=${{ steps.copy.outcome }}, deploy=${{ steps.deploy.outcome }}"
          fi

  deploy-summary:
    runs-on: ubuntu-latest
    needs:
      - deploy-origin-1
      - deploy-origin-2
    if: always()

    steps:
      - name: Summarize origin deployment results
        run: |
          cat <<'SUMMARY' >> "$GITHUB_STEP_SUMMARY"
          ## Deployment summary

          | Origin | Result |
          | --- | --- |
          | origin 1 | `${{ needs.deploy-origin-1.outputs.deploy_result }}` |
          | origin 2 | `${{ needs.deploy-origin-2.outputs.deploy_result }}` |
          SUMMARY

          if [ "${{ needs.deploy-origin-1.outputs.deploy_result }}" != "success" ] && [ "${{ needs.deploy-origin-2.outputs.deploy_result }}" != "success" ]; then
            echo "No origin deployed successfully." >&2
            exit 1
          fi

          if [ "${{ needs.deploy-origin-1.outputs.deploy_result }}" != "success" ] || [ "${{ needs.deploy-origin-2.outputs.deploy_result }}" != "success" ]; then
            echo "::warning::Partial deployment: at least one origin updated, but one origin failed."
          fi
