name: Build, test, and deploy portfolio

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Retained 40-character release SHA to activate instead of deploying"
        required: false
        type: string

concurrency:
  group: portfolio-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.22.1"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        run: npm run test:e2e
      - name: Archive build output
        run: tar -czf ../site-dist.tar.gz -C dist .
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: site-dist
          path: site-dist.tar.gz
          if-no-files-found: error

  deploy:
    # DEPLOY_ENABLED is repository-scoped so GitHub can evaluate it before the
    # production environment is attached to the runner.
    if: github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    needs: build-and-test
    runs-on: [self-hosted, linux, x64, portfolio-deploy]
    timeout-minutes: 10
    environment:
      name: production
      url: https://shanekanterman.dev
    permissions:
      contents: read
    steps:
      - name: Check out deployment configuration
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Download build artifact
        if: inputs.rollback_sha == ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: site-dist
      - name: Configure deployment SSH identity
        run: |
          set -euo pipefail
          source ~/.config/infisical/machine.env
          infisical_token=$(infisical login --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" \
            --client-secret="$INFISICAL_CLIENT_SECRET" \
            --domain="$INFISICAL_DOMAIN" --plain --silent)
          deploy_key=$(INFISICAL_TOKEN="$infisical_token" \
            infisical secrets get PORTFOLIO_DEPLOY_SSH_KEY \
            --projectId="$INFISICAL_PROJECT" --env=prod \
            --domain="$INFISICAL_DOMAIN" --plain --silent)
          install -m 0700 -d ~/.ssh
          printf '%s\n' "$deploy_key" > ~/.ssh/portfolio
          chmod 0600 ~/.ssh/portfolio
          install -m 0644 infrastructure/kantercloud/portfolio-known-hosts \
            ~/.ssh/known_hosts
          unset deploy_key infisical_token
      - name: Deploy release
        if: inputs.rollback_sha == ''
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/portfolio portfolio-deploy@10.40.0.32 "deploy $RELEASE_SHA" < site-dist.tar.gz
      - name: Roll back to retained release
        if: inputs.rollback_sha != ''
        env:
          ROLLBACK_SHA: ${{ inputs.rollback_sha }}
        run: |
          printf '%s' "$ROLLBACK_SHA" | grep -Eq '^[0-9a-f]{40}$' || {
            echo "rollback_sha must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          }
          ssh -i ~/.ssh/portfolio portfolio-deploy@10.40.0.32 "rollback $ROLLBACK_SHA"
      - name: Verify public health
        run: |
          response=$(curl --fail --silent --show-error \
            --retry 5 --retry-delay 2 --retry-all-errors \
            https://shanekanterman.dev/healthz)
          [ "$response" = "ok" ]
      - name: Remove deployment SSH identity
        if: always()
        run: rm -f ~/.ssh/portfolio
