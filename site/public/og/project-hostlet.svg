<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="title desc">
  <title id="title">Hostlet self-hosted deployment panel social preview</title>
  <desc id="desc">Social preview card for the Hostlet self-hosted deployment panel case study.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e4e4e7" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <rect width="1200" height="627" rx="32" fill="url(#bg)" />
  <rect x="54" y="54" width="1092" height="519" rx="28" fill="#ffffff" stroke="#e4e4e7" stroke-width="2" />
  <rect x="90" y="90" width="1020" height="14" rx="7" fill="url(#accent)" />

  <rect x="90" y="136" width="210" height="42" rx="21" fill="#ecfdf5" />
  <text x="195" y="163" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#047857">Case Study</text>
  <text x="90" y="260" font-family="Georgia, Times New Roman, serif" font-size="66" font-weight="700" fill="#18181b">Hostlet</text>
  <text x="90" y="330" font-family="Georgia, Times New Roman, serif" font-size="60" font-weight="700" fill="#1e293b">Self-Hosted Deployments</text>
  <text x="90" y="405" font-family="Inter, Arial, sans-serif" font-size="25" fill="#52525b">
    <tspan x="90">A Rust control plane and local agent for deploying</tspan>
    <tspan x="90" dy="36">GitHub projects to Docker on a machine I own.</tspan>
  </text>

  <g>
    <rect x="90" y="462" width="1020" height="1" fill="#e4e4e7" />
    <text x="90" y="510" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#18181b">Rust  •  Docker  •  PostgreSQL  •  Caddy  •  Cloudflare  •  GitHub OAuth</text>
    <text x="90" y="550" font-family="Inter, Arial, sans-serif" font-size="22" fill="#71717a">Shane Kanterman</text>
  </g>

  <rect x="880" y="136" width="230" height="230" rx="28" fill="url(#panel)" />
  <rect x="925" y="186" width="140" height="28" rx="8" fill="#d1fae5" opacity="0.95" />
  <rect x="925" y="238" width="140" height="28" rx="8" fill="#bfdbfe" opacity="0.95" />
  <rect x="925" y="290" width="140" height="28" rx="8" fill="#e0f2fe" opacity="0.95" />
  <path d="M995 214v24M995 266v24" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />
</svg>
